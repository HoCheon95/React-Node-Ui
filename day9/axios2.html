<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <title>AXIOS 특징 실습</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body>
  <h1>AXIOS 특징 실습</h1>
  <script>
    /*
    AXIOS 사용 순서
    1. cdn 방식 또는 npm install 로 axios 설치
    -> 왜냐? axios 는 내장되어 있는 라이브러리가 아닌 외부 라이브러리이기 때문이다!
    2. axios 설치 후 CRUD 에 따라 axios.get(요청URL), axios.post(요청URL), axios.put(요청URL), axios.delete(요청URL) 을 사용한다.
    -> 주의할 점 : 
      1) 상세조회는 pathParameter 필요, 목록조회는 pathParameter 가 필요없다.
      2) post 는 body(등록할 내용) 필요
      3) put 은 pathParameter 와 body(수정할 내용) 필요
      4) delete 도 pathParameter 필요
    3. axios 로 요청한 url 의 응답을 .then 으로 받는다.
    -> then을 쓰는 이유? promise를 반환하기 때문이다.
    -> axios는 fetch 와 달리 응답데이터를 .json() JSON 파싱을 할 필요가 없다.
      따라서 첫 번째 then 에서 응답데이터.data 로 데이터를 뽑아낼 수 있다.
    4. 첫 번째 then 에서 데이터 시각화 및 활용
    5. then 을 사용했으면 catch를 통해 오류를 잡아줘야 한다.<br>
    -> fetch와 달리 response.ok 를 사용해서 오류를 발생시키지 않아도 된다. axios는 오류 발생 시 catch가 자동으로 잡아준다.
    */
  </script>

  <button id="btnJson">JSON 자동 파싱</button>
  <div id="jsonResult"></div>
  <hr />

  <button id="btnSimple">간단한 요청</button>
  <div id="simpleResult"></div>
  <hr />

  <button id="btnError">에러 처리</button>
  <div id="errorResult"></div>
  <hr />

  <script>
    const API_URL = "https://jsonplaceholder.typicode.com/users";

    //JSON 자동 파싱
    document.getElementById("btnJson").addEventListener("click", () => {
      axios
        .get(`${API_URL}`)
        //인자 명은 마음대로 바꿀 수 있다.
        .then((res) => {
          //res.data 에 JSON 객체(데이터)가 있다.
          console.log(res);
          // 응답 데이터의 id, username, email, address 의 street 을 시각화 하세요
          const names = res.data.map((user) =>
            `<div>
              name : ${user.name}
              <br>
              username : ${user.username}
              <br>
              email : ${user.email}
              <br>
              address : ${user.address.street}
              <br>
              <br>
              </div>`).join("");
          document.getElementById("jsonResult").innerHTML = names;
        })
        .catch((err) => {
          document.getElementById("jsonResult").innerHTML =
            `에러 발생 : ${err}`;
        });
    });

    // "https://jsonplaceholder.typicode.com/users"; 목록 데이터를 fetch로 호출하여 화면에 출력하세요
    document.getElementById("btnSimple").addEventListener("click", () => {
      fetch("https://jsonplaceholder.typicode.com/users")
        .then((res) => res.json())
        .then(data => {
          console.log(data);
        })
    })
  </script>
</body>

</html>
